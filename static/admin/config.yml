backend:
  name: github
  repo: hoangjustinseo-ctrl/conmeobayvaodutru
  branch: main
  base_url: https://hidden-queen-825a.hoangjustinseo.workers.dev

media_folder: static/images
public_folder: /images

collections:
  - name: posts
    label: Bài viết
    folder: content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
   fields:
      - { label: Tiêu đề, name: title, widget: string }
      - { label: Ngày đăng, name: date, widget: datetime }
      - { label: Mô tả, name: description, widget: string, required: false }
      - { label: Danh mục, name: category, widget: select, options: ["Tâm linh", "Thiên văn", "Ngoài hành tinh", "Atlantis", "Lịch sử bí ẩn"], required: false }
      - { label: Ảnh thumbnail, name: image, widget: image, required: false }
      - { label: Video YouTube, name: youtube, widget: string, required: false, hint: "Chỉ paste ID video, ví dụ: dQw4w9WgXcQ" }
      - { label: Video TikTok, name: tiktok, widget: string, required: false, hint: "Paste link TikTok đầy đủ" }
      - { label: Nội dung, name: body, widget: markdown }