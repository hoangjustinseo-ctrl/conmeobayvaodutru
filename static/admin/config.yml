backend:
  name: github
  repo: hoangjustinseo-ctrl/conmeobayvaodutru
  branch: main
  base_url: https://hidden-queen-825a.hoangjustinseo.workers.dev

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Bài viết"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Mô tả ngắn", name: "description", widget: "text", required: false }
      - label: "Chủ đề"
        name: "categories"
        widget: "select"
        required: false
        options:
          - "Tâm linh"
          - "Thiên văn"
          - "Ngoài hành tinh"
          - "Atlantis"
          - "Lịch sử bí ẩn"
      - label: "Series / Album sách"
        name: "series"
        widget: "select"
        required: false
        options:
          - "Keepers of the Garden"
          - "Sách của bà Dolores Cannon"
          - "Nhật ký ngoài hành tinh"
          - "Cuộc đời giữa các kiếp sống"
      - label: "Số thứ tự trong series"
        name: "series_order"
        widget: "number"
        required: false
        value_type: "int"
        min: 1
      - label: "Ảnh thumbnail"
        name: "image"
        widget: "image"
        required: false
        media_folder: "/static/images"
        public_folder: "/images"
      - { label: "YouTube ID", name: "youtube", widget: "string", required: false }
      - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }
      - { label: "Nội dung", name: "body", widget: "markdown" }