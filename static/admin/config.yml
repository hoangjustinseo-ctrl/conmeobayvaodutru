backend:
  name: github
  repo: hoangjustinseo-ctrl/conmeobayvaodutru
  branch: main
  base_url: https://hidden-queen-825a.hoangjustinseo.workers.dev

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Bai viet"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tieu de", name: "title", widget: "string" }
      - { label: "Ngay dang", name: "date", widget: "datetime" }
      - { label: "Mo ta ngan", name: "description", widget: "text", required: false }
      - label: "Chu de / Tag"
        name: "categories"
        widget: "list"
        required: false
        field:
          label: Tag
          name: tag
          widget: string
      - label: "Series / Album sach"
        name: "series"
        widget: "select"
        required: false
        options:
          - "Keepers of the Garden"
          - "Sach cua ba Dolores Cannon"
          - "Nhat ky ngoai hanh tinh"
          - "Cuoc doi giua cac kiep song"
      - label: "So thu tu trong series"
        name: "series_order"
        widget: "number"
        required: false
        value_type: "int"
        min: 1
      - label: "Anh thumbnail"
        name: "image"
        widget: "image"
        required: false
        media_folder: "/static/images"
        public_folder: "/images"
      - { label: "YouTube ID", name: "youtube", widget: "string", required: false }
      - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }
      - label: "Noi dung"
        name: "body"
        widget: "markdown"
        media_folder: "/static/images"
        public_folder: "/images"
