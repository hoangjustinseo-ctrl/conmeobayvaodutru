<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap');
.ba-hero{position:relative;width:100%;height:100%;overflow:hidden;cursor:col-resize;user-select:none;background:#080e12;}
.ba-before,.ba-after{position:absolute;inset:0;}
.ba-before{z-index:1;}
.ba-after{z-index:2;clip-path:inset(0 52% 0 0);}
.ba-hint{position:absolute;top:32px;left:50%;transform:translateX(-30%);z-index:20;pointer-events:none;animation:hintBob 2s ease-in-out infinite;}
.ba-hint-text{font-family:'Caveat',cursive;font-size:22px;color:#f59e0b;transform:rotate(-8deg);display:block;white-space:nowrap;}
.ba-hint-arrow{font-size:18px;color:#f59e0b;display:block;text-align:center;margin-top:-4px;}
@keyframes hintBob{0%,100%{transform:translateX(-30%) translateY(0);}50%{transform:translateX(-30%) translateY(-6px);}}
.ba-handle{position:absolute;top:0;left:52%;width:3px;height:100%;background:#f59e0b;z-index:10;transform:translateX(-50%);transition:left 0s;}
.ba-handle-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:#f59e0b;border:2.5px solid #fff;cursor:col-resize;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:0 0 0 12px rgba(245,158,11,0);}}
.ba-arrows{display:flex;align-items:center;justify-content:center;gap:4px;color:#fff;font-size:13px;font-weight:700;}
.ba-label{position:absolute;bottom:16px;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:rgba(8,14,18,0.7);z-index:15;}
.ba-label-left{left:16px;color:#5dcaa5;border:0.5px solid rgba(93,202,165,0.4);}
.ba-label-right{right:16px;color:rgba(197,168,120,0.8);border:0.5px solid rgba(197,168,120,0.3);}
.ba-cat{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;}
.ba-cat-circle{width:130px;height:130px;border-radius:50%;background:#fff;overflow:hidden;border:3px solid rgba(10,124,110,0.6);margin-bottom:1rem;animation:catFloat 4s ease-in-out infinite;}
@keyframes catFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.ba-cat-name{font-family:'Amatic SC',cursive;font-size:20px;font-weight:700;color:#f7f3ee;letter-spacing:0.05em;text-align:center;}
.ba-cat-sub{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(197,168,120,0.7);text-align:center;margin-top:0.3rem;}
</style>

<div class="ba-hero" id="baHero2">
  <div class="ba-before">
    <canvas id="baBefore2"></canvas>
    <div class="ba-cat">
      <div class="ba-cat-circle">
        <img src="/images/logo.jpg" alt="Logo" style="width:100%;height:100%;object-fit:cover;"
          onerror="this.style.display='none';this.parentElement.innerHTML='<svg viewBox=\'0 0 130 130\' xmlns=\'http://www.w3.org/2000/svg\' style=\'width:100%;height:100%;background:#f0ebe3;\'><path d=\'M30 62 Q65 44 100 62 Q95 86 65 96 Q35 86 30 62Z\' fill=\'#2a2a2a\'/><path d=\'M30 62 L18 40 L38 56Z\' fill=\'#2a2a2a\'/><path d=\'M100 62 L112 40 L92 56Z\' fill=\'#2a2a2a\'/><ellipse cx=\'50\' cy=\'71\' rx=\'7\' ry=\'8\' fill=\'#f7f3ee\'/><ellipse cx=\'80\' cy=\'71\' rx=\'7\' ry=\'8\' fill=\'#f7f3ee\'/><circle cx=\'50\' cy=\'72\' r=\'3.5\' fill=\'#1a1a1a\'/><circle cx=\'80\' cy=\'72\' r=\'3.5\' fill=\'#1a1a1a\'/><circle cx=\'51\' cy=\'70\' r=\'1.2\' fill=\'#fff\'/><circle cx=\'81\' cy=\'70\' r=\'1.2\' fill=\'#fff\'/><ellipse cx=\'65\' cy=\'80\' rx=\'4\' ry=\'3.5\' fill=\'#e8a0a0\'/><line x1=\'45\' y1=\'78\' x2=\'25\' y2=\'74\' stroke=\'#2a2a2a\' stroke-width=\'1\'/><line x1=\'45\' y1=\'80\' x2=\'25\' y2=\'80\' stroke=\'#2a2a2a\' stroke-width=\'1\'/><line x1=\'85\' y1=\'78\' x2=\'105\' y2=\'74\' stroke=\'#2a2a2a\' stroke-width=\'1\'/><line x1=\'85\' y1=\'80\' x2=\'105\' y2=\'80\' stroke=\'#2a2a2a\' stroke-width=\'1\'/><path d=\'M60 84 Q65 88 70 84\' fill=\'none\' stroke=\'#1a1a1a\' stroke-width=\'1.5\'/></svg>'"/>
      </div>
      <p class="ba-cat-name">Con Mèo Bay Vào Dũ Trụ</p>
      <p class="ba-cat-sub">✦ Mọi thứ đều có kết nối ✦</p>
    </div>
  </div>

  <div class="ba-after" id="baAfter2">
    <canvas id="baAfter2Canvas"></canvas>
  </div>

  <div class="ba-hint" id="baHint">
    <span class="ba-hint-text">Kéo đi, hay lắm.</span>
    <span class="ba-hint-arrow">↓</span>
  </div>

  <div class="ba-handle" id="baHandle2">
    <div class="ba-handle-btn">
      <div class="ba-arrows">◀▶</div>
    </div>
  </div>

  <span class="ba-label ba-label-left">Vũ trụ</span>
  <span class="ba-label ba-label-right">Tinh vân</span>
</div>

<script>
(function(){
  const hero = document.getElementById('baHero2');
  const after = document.getElementById('baAfter2');
  const handle = document.getElementById('baHandle2');
  const hint = document.getElementById('baHint');
  let particles = [];
  let animFrame;

  function initParticles(canvas, count, colors){
    const arr = [];
    for(let i=0;i<count;i++){
      arr.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.8+0.3,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.3,
        o: Math.random()*0.7+0.3,
        c: colors[Math.floor(Math.random()*colors.length)]
      });
    }
    return arr;
  }

  function drawNebula(ctx, w, h, glows, bg){
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,w,h);
    glows.forEach(g=>{
      const gr = ctx.createRadialGradient(g.x*w,g.y*h,0,g.x*w,g.y*h,g.r);
      gr.addColorStop(0,g.c); gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
    });
  }

  function animate(){
    const c1 = document.getElementById('baBefore2');
    const c2 = document.getElementById('baAfter2Canvas');
    if(!c1||!c2){cancelAnimationFrame(animFrame);return;}
    const ctx1 = c1.getContext('2d');
    const ctx2 = c2.getContext('2d');
    const w = c1.width, h = c1.height;

    drawNebula(ctx1,w,h,[
      {x:0.35,y:0.4,r:180,c:'rgba(10,124,110,0.3)'},
      {x:0.65,y:0.6,r:130,c:'rgba(83,74,183,0.2)'},
    ],'#080e12');

    drawNebula(ctx2,w,h,[
      {x:0.5,y:0.45,r:200,c:'rgba(83,74,183,0.55)'},
      {x:0.25,y:0.7,r:130,c:'rgba(245,158,11,0.2)'},
      {x:0.75,y:0.3,r:100,c:'rgba(255,107,53,0.22)'},
    ],'#0e0a1a');

    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=w; if(p.x>w) p.x=0;
      if(p.y<0) p.y=h; if(p.y>h) p.y=0;
      p.o += (Math.random()-0.5)*0.05;
      p.o = Math.max(0.1, Math.min(1, p.o));

      [ctx1, ctx2].forEach(ctx=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.c.replace('opacity',p.o.toFixed(2));
        ctx.fill();
      });
    });

    animFrame = requestAnimationFrame(animate);
  }

  setTimeout(()=>{
    const c1 = document.getElementById('baBefore2');
    const c2 = document.getElementById('baAfter2Canvas');
    const w = hero.offsetWidth || 340;
    const h = hero.offsetHeight || 520;
    c1.width = c2.width = w;
    c1.height = c2.height = h;
    particles = initParticles(c1, 120, [
      'rgba(247,243,238,opacity)',
      'rgba(93,202,165,opacity)',
      'rgba(197,168,120,opacity)',
    ]);
    animate();
  },100);

  function setPos(x){
    const rect = hero.getBoundingClientRect();
    let pct = ((x-rect.left)/rect.width)*100;
    pct = Math.min(Math.max(pct,2),98);
    after.style.clipPath = `inset(0 ${100-pct}% 0 0)`;
    handle.style.left = pct+'%';
    hint.style.opacity = '0';
  }

  let active = false;
  handle.addEventListener('mousedown',()=>active=true);
  hero.addEventListener('click',e=>setPos(e.clientX));
  window.addEventListener('mouseup',()=>active=false);
  window.addEventListener('mousemove',e=>{if(active) setPos(e.clientX);});
  hero.addEventListener('touchstart',e=>{active=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>active=false);
  window.addEventListener('touchmove',e=>{if(active) setPos(e.touches[0].clientX);},{passive:true});
})();
</script>
